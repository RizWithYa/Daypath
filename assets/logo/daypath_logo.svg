<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- Background card (neubrutalism style: thick border, hard shadow) -->
  <rect x="4" y="4" width="312" height="92" rx="0" ry="0" fill="#1A1F2B" />
  <rect x="0" y="0" width="312" height="92" rx="0" ry="0"
        fill="#FFFFFF" stroke="#1A1F2B" stroke-width="3" />

  <!-- ===== ICON MARK (left side, 80x80 area padded to 92px tall) ===== -->
  <!-- Icon background pill -->
  <rect x="8" y="8" width="76" height="76" rx="0"
        fill="#007BFF" stroke="#1A1F2B" stroke-width="2.5" />

  <!-- Crescent moon (cut-circle technique) -->
  <!-- Full circle -->
  <circle cx="46" cy="38" r="18" fill="#FFBA24" />
  <!-- Cutout circle to form crescent -->
  <circle cx="53" cy="33" r="15" fill="#007BFF" />

  <!-- Path/road arrow pointing up-right (daily journey) -->
  <!-- Vertical stem -->
  <rect x="41" y="52" width="6" height="20" rx="0" fill="#FFFFFF" />
  <!-- Arrow head pointing up-right -->
  <polygon points="44,48 36,62 52,62" fill="#FFFFFF" />
  <!-- Small dot at base (starting point) -->
  <circle cx="44" cy="74" r="3" fill="#FFBA24" />

  <!-- ===== WORDMARK (right side) ===== -->
  <!-- "Day" in white, bold -->
  <text x="98" y="52"
        font-family="'Epilogue', 'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="38"
        fill="#1A1F2B"
        letter-spacing="-1">Day</text>

  <!-- "Path" in blue, bold -->
  <text x="170" y="52"
        font-family="'Epilogue', 'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="38"
        fill="#007BFF"
        letter-spacing="-1">Path</text>

  <!-- Tagline -->
  <text x="98" y="72"
        font-family="'Epilogue', Arial, sans-serif"
        font-weight="500"
        font-size="12"
        fill="#888888"
        letter-spacing="2">YOUR DAILY JOURNEY</text>
</svg>
